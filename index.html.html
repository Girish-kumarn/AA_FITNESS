<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<title>Workout Tracker</title>

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    padding:18px;
    color:white;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
}
.logo{text-align:center;font-size:30px;font-weight:700;letter-spacing:3px;}
.sub{text-align:center;opacity:.8;margin-bottom:18px;}
.card{
    backdrop-filter: blur(12px);
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px;
    margin:14px 0;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.header{font-size:18px;font-weight:600;cursor:pointer;}
.content{max-height:0;overflow:hidden;transition:max-height .4s ease;}
label{display:block;margin:8px 0;}
input[type="checkbox"]{transform:scale(1.3);margin-right:8px;}
textarea{
    width:100%;margin-top:10px;padding:10px;border-radius:10px;
    border:none;background:rgba(0,0,0,0.35);color:white;
}
button{
    width:100%;padding:14px;border:none;border-radius:14px;
    background:#00c853;color:white;font-weight:600;margin-top:18px;
}
#popup{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.92);
    padding:28px;border-radius:20px;display:none;
    z-index:10;text-align:center;font-size:20px;
}
.bigLove{font-size:36px;font-weight:700;color:#ff4da6;}
.confetti{
    position:fixed;width:12px;height:12px;border-radius:50%;
    animation:fall 1.4s linear forwards;
}
@keyframes fall{
    from{transform:translateY(0)}
    to{transform:translateY(700px);opacity:0}
}
</style>
</head>

<body>

<div class="logo">AA</div>
<div class="sub">Sweat now. Shine later</div>
<div id="app"></div>
<button onclick="resetAll()">Reset Week</button>
<div id="popup"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbUSlyRJU9lw1OtQbt-G2CVhf6ReTDv64",
  authDomain: "fitness-tracker-8e39d.firebaseapp.com",
  projectId: "fitness-tracker-8e39d",
  storageBucket: "fitness-tracker-8e39d.firebasestorage.app",
  messagingSenderId: "53440039292",
  appId: "1:53440039292:web:362f3aabc254136b8cfcf9",
  measurementId: "G-ZL3K1D70SS"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

// generate unique client id once
const clientId = localStorage.getItem("clientId") || "client_"+Date.now();
localStorage.setItem("clientId",clientId);

async function saveToFirebase(day,data){
    try{
        await setDoc(doc(db,"clients",clientId,"days","day"+day),data);
        console.log("Saved to Firebase");
    }catch(e){
        console.log("Firebase error",e);
    }
}

window.saveToFirebase = saveToFirebase;
</script>

<script>
const quotes=[
"Excellent work today. Come back stronger tomorrow.",
"Consistency is changing your body.",
"You showed up. That’s powerful.",
"Momentum is building. Keep pushing.",
"Discipline is winning for you.",
"Proud of your effort today.",
"Rest, recover, dominate next week."
];

const workouts=[
["Monday",["Squats - 3x15","Glute bridges - 3x20","Donkey kicks - 3x15","Plank - 30 sec","Bicycle crunch - 3x15"]],
["Tuesday",["Side bends - 3x20","Russian twists - 3x20","Heel taps - 3x20","Mountain climbers - 3x20","Side plank - 25 sec"]],
["Wednesday",["Squat hold - 30 sec","Step-ups - 3x12","Frog pumps - 3x25","Fire hydrants - 3x15"]],
["Thursday",["Plank - 40 sec","Dead bug - 3x15","Leg raises - 3x15","Toe touches - 3x20"]],
["Friday",["Jumping jacks - 30 sec","Squats - 15","Mountain climbers - 20","Plank - 30 sec"]],
["Saturday",["Reverse crunch - 3x15","Bicycle crunch - 3x20","Side plank dips - 3x12","V-sit hold - 25 sec"]],
["Sunday",["Walk","Stretch","Mobility"]]
];

const app=document.getElementById("app");

workouts.forEach((w,i)=>{
    let saved=JSON.parse(localStorage.getItem("d"+i)||"{}");

    const card=document.createElement("div");
    card.className="card";

    const head=document.createElement("div");
    head.className="header";
    head.textContent=w[0];

    const content=document.createElement("div");
    content.className="content";

    head.onclick=()=>{
        content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight+"px";
    };

    w[1].forEach((ex,j)=>{
        const row=document.createElement("label");
        row.innerHTML=`<input type="checkbox"> ${ex}`;
        const box=row.querySelector("input");
        if(saved[j]) box.checked=true;

        box.onchange=()=>{
            saved[j]=box.checked;
            localStorage.setItem("d"+i,JSON.stringify(saved));
            saveToFirebase(i,saved);
            checkComplete(i);
        };
        content.appendChild(row);
    });

    const note=document.createElement("textarea");
    note.placeholder="Notes...";
    note.value=saved.note||"";
    note.onchange=()=>{
        saved.note=note.value;
        localStorage.setItem("d"+i,JSON.stringify(saved));
        saveToFirebase(i,saved);
    };
    content.appendChild(note);

    card.appendChild(head);
    card.appendChild(content);
    app.appendChild(card);
});

function checkComplete(day){
    const data=JSON.parse(localStorage.getItem("d"+day)||"{}");
    const total=workouts[day][1].length;
    let done=0;
    for(let i=0;i<total;i++) if(data[i]) done++;

    if(done===total) celebrate(day);
}

function celebrate(day){
    const popup=document.getElementById("popup");

    if(day===6){
        popup.innerHTML=`<div class="bigLove">I LOVE YOU ANU BABY :)</div>`;
    }else{
        popup.innerHTML=quotes[day % quotes.length];
    }

    popup.style.display="block";

    for(let i=0;i<220;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*window.innerWidth+"px";
        c.style.background=`hsl(${Math.random()*360},80%,60%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),1400);
    }

    setTimeout(()=>popup.style.display="none",4000);
}

function resetAll(){
    localStorage.clear();
    location.reload();
}
</script>
</body>
</html>
